    <style>
      @keyframes signal-glow {
        0% {
          box-shadow: 0 0 20px rgba(0, 218, 243, 0.4);
          background-color: rgba(0, 218, 243, 0.08);

    <script>
      const tbody = document.getElementById("signals-tbody");
      const signalCount = document.getElementById("signal-count");
      const connStatus = document.getElementById("connection-status");
      const streamDot = document.getElementById("stream-dot");
      const streamLabel = document.getElementById("stream-label");
      const callsBadge = document.getElementById("calls-badge");
      const btnStart = document.getElementById("btn-start");
      const btnStop = document.getElementById("btn-stop");
      const searchInput = document.getElementById("search-input");
      let totalSignals = 0;
      let allSignals = []; // store all signals for filtering

      function createRow(s, isNew) {
        const targets = s.targets || [];
        const tr = document.createElement("tr");
        tr.className =
          "group hover:bg-surface-container-highest/30 transition-colors" +
          (isNew ? " signal-new" : "");
        tr.dataset.symbol = (s.symbol || "").toLowerCase();
        tr.dataset.option = (s.option_type || "").toLowerCase();
        tr.innerHTML = `
        <td class="px-4 py-4 rounded-l-xl">
            <div class="flex flex-col">
                <span class="font-headline font-bold">${s.symbol || "—"} ${s.strike || ""}</span>
                <span class="text-[10px] opacity-60">${s.status || "PARSED"}</span>
            </div>
        </td>
        <td class="px-4 py-4">${s.entry_price ? "₹ " + s.entry_price : "—"}</td>
        <td class="px-4 py-4">${s.entry_price || "—"}</td>
        <td class="px-4 py-4">${s.option_type || "—"}</td>
        <td class="px-4 py-4">${s.stop_loss || "—"}</td>
        <td class="px-4 py-4">${targets[0] || "—"}</td>
        <td class="px-4 py-4">${targets[1] || "—"}</td>
        <td class="px-4 py-4 rounded-r-xl">${targets[2] || "—"}</td>
    `;
        return tr;
      }

      function updateCount() {
        signalCount.textContent = totalSignals;
        if (callsBadge) callsBadge.textContent = totalSignals;
      }

      // ====== 1. Load existing signals ======
      async function loadExistingSignals() {
        try {
          const res = await fetch("/api/signals");
          if (!res.ok) return;
          const signals = await res.json();
          allSignals = signals;
          totalSignals = signals.length;
          updateCount();
          signals.forEach((s) => {
            tbody.appendChild(createRow(s, false));
          });
        } catch (e) {
          console.error("Failed to load signals:", e);
        }
      }

      // ====== 2. SSE real-time ======
      function connectSSE() {
        const evtSource = new EventSource("/api/signals/stream");
        evtSource.onmessage = (event) => {
          const signal = JSON.parse(event.data);
          allSignals.unshift(signal);
          totalSignals++;
          updateCount();
          const row = createRow(signal, true);
          tbody.insertBefore(row, tbody.firstChild);
          // Flash notification dot
          const notifDot = document.getElementById("notif-dot");
          if (notifDot) notifDot.classList.remove("hidden");
        };
        evtSource.onerror = () => {
          connStatus.innerHTML =
            '<span class="text-error">● DISCONNECTED</span>';
          streamDot.classList.remove("bg-primary", "animate-pulse");
          streamDot.classList.add("bg-error");
          streamLabel.textContent = "Reconnecting...";
          streamLabel.classList.remove("text-primary");
          streamLabel.classList.add("text-error");
          setTimeout(() => {
            connStatus.innerHTML =
              '<span class="text-primary">● CONNECTED</span>';
            streamDot.classList.remove("bg-error");
            streamDot.classList.add("bg-primary", "animate-pulse");
            streamLabel.textContent = "Live";
            streamLabel.classList.remove("text-error");
            streamLabel.classList.add("text-primary");
          }, 5000);
        };
        evtSource.onopen = () => {
          connStatus.innerHTML =
            '<span class="text-primary">● CONNECTED</span>';
        };
      }

      // ====== 3. START/STOP Execution Toggle ======
      function setExecutionUI(enabled) {
        if (enabled) {
          btnStart.classList.add(
            "bg-tertiary",
            "text-on-tertiary",
            "shadow-[0_0_12px_rgba(60,227,106,0.25)]",
          );
          btnStart.classList.remove("text-on-surface-variant");
          btnStop.classList.remove(
            "bg-error",
            "text-white",
            "shadow-[0_0_12px_rgba(255,180,171,0.25)]",
          );
          btnStop.classList.add("text-on-surface-variant");
        } else {
          btnStop.classList.add(
            "bg-error",
            "text-white",
            "shadow-[0_0_12px_rgba(255,180,171,0.25)]",
          );
          btnStop.classList.remove("text-on-surface-variant");
          btnStart.classList.remove(
            "bg-tertiary",
            "text-on-tertiary",
            "shadow-[0_0_12px_rgba(60,227,106,0.25)]",
          );
          btnStart.classList.add("text-on-surface-variant");
        }
      }

      async function loadExecutionState() {
        try {
          const res = await fetch("/api/execution");
          if (!res.ok) return;
          const data = await res.json();
          setExecutionUI(data.enabled);
        } catch (e) {
          /* ignore */
        }
      }

      btnStart.addEventListener("click", async () => {
        await fetch("/api/execution", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: true }),
        });
        setExecutionUI(true);
      });

      btnStop.addEventListener("click", async () => {
        await fetch("/api/execution", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: false }),
        });
        setExecutionUI(false);
      });

      // ====== 4. Search / Filter ======
      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        const rows = tbody.querySelectorAll("tr");
        rows.forEach((row) => {
          const sym = row.dataset.symbol || "";
          const opt = row.dataset.option || "";
          const text = row.textContent.toLowerCase();
          row.style.display =
            text.includes(query) || sym.includes(query) || opt.includes(query)
              ? ""
              : "none";
        });
      });

      // ====== 5. Export CSV ======
      document.getElementById("btn-export").addEventListener("click", () => {
        if (allSignals.length === 0) {
          alert("No signals to export.");
          return;
        }
        const headers = [
          "Symbol",
          "Strike",
          "Option",
          "Entry Price",
          "Stop Loss",
          "Target 1",
          "Target 2",
          "Target 3",
          "Status",
        ];
        const csvRows = [headers.join(",")];
        allSignals.forEach((s) => {
          const t = s.targets || [];
          csvRows.push(
            [
              s.symbol || "",
              s.strike || "",
              s.option_type || "",
              s.entry_price || "",
              s.stop_loss || "",
              t[0] || "",
              t[1] || "",
              t[2] || "",
              s.status || "",
            ].join(","),
          );
        });
        const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "signals_export.csv";
        a.click();
        URL.revokeObjectURL(url);
      });

      // ====== 6. Notifications Button ======
      document
        .getElementById("btn-notifications")
        .addEventListener("click", () => {
          document.getElementById("notif-dot").classList.add("hidden");
          alert(
            "New signals are shown as glowing rows at the top of the table.",
          );
        });

      // ====== 7. Filter Button (toggle option type) ======
      let filterState = "all"; // all, ce, pe
      document.getElementById("btn-filter").addEventListener("click", () => {
        const states = ["all", "ce", "pe"];
        const idx = (states.indexOf(filterState) + 1) % states.length;
        filterState = states[idx];
        const btn = document.getElementById("btn-filter");
        const rows = tbody.querySelectorAll("tr");

        if (filterState === "all") {
          btn.querySelector("span:last-child")?.remove();
          rows.forEach((r) => (r.style.display = ""));
        } else {
          // Add an active indicator
          const existing = btn.querySelector("span.filter-tag");
          if (existing) existing.textContent = filterState.toUpperCase();
          else {
            const tag = document.createElement("span");
            tag.className = "filter-tag ml-1 text-primary";
            tag.textContent = filterState.toUpperCase();
            btn.appendChild(tag);
          }
          rows.forEach((r) => {
            r.style.display = r.dataset.option === filterState ? "" : "none";
          });
        }
      });

      // ====== 8. Tabs (Calls = all signals, Orders = executed only) ======
      const tabCalls = document.getElementById("tab-calls");
      const tabOrders = document.getElementById("tab-orders");
      let activeTab = "calls";

      tabCalls.addEventListener("click", () => {
        activeTab = "calls";
        tabCalls.classList.add(
          "text-[#00daf3]",
          "border-b-2",
          "border-[#00daf3]",
        );
        tabCalls.classList.remove("text-[#c1c6d7]", "opacity-60");
        tabOrders.classList.remove(
          "text-[#00daf3]",
          "border-b-2",
          "border-[#00daf3]",
        );
        tabOrders.classList.add("text-[#c1c6d7]", "opacity-60");
        // Show all rows
        tbody.querySelectorAll("tr").forEach((r) => (r.style.display = ""));
      });

      tabOrders.addEventListener("click", () => {
        activeTab = "orders";
        tabOrders.classList.add(
          "text-[#00daf3]",
          "border-b-2",
          "border-[#00daf3]",
        );
        tabOrders.classList.remove("text-[#c1c6d7]", "opacity-60");
        tabCalls.classList.remove(
          "text-[#00daf3]",
          "border-b-2",
          "border-[#00daf3]",
        );
        tabCalls.classList.add("text-[#c1c6d7]", "opacity-60");
        // Show only EXECUTED rows (for now show all since broker isn't connected)
        tbody.querySelectorAll("tr").forEach((r) => {
          const statusCell = r.querySelector("td .text-\\[10px\\]");
          if (statusCell && statusCell.textContent.trim() === "EXECUTED") {
            r.style.display = "";
          } else {
            r.style.display = "none";
          }
        });
      });

      // ====== 9. Role-Aware UI Initialization ======
      let currentRole = "user";
      let BROKERS = [];
      let activeBroker = "angelone";

      function buildAdminSidebar() {
        document.getElementById("role-nav-slot").innerHTML = `
          <a class="flex items-center gap-3 px-4 py-3 text-[#c1c6d7] opacity-70 hover:bg-[#1b2025] hover:text-[#00daf3] transition-all duration-200 ease-in-out" href="/admin/users">
              <span class="material-symbols-outlined" data-icon="group">group</span>
              <span class="font-['Inter'] text-sm tracking-tight">Manage Users</span>
          </a>
          <a class="flex items-center gap-3 px-4 py-3 text-[#c1c6d7] opacity-70 hover:bg-[#1b2025] hover:text-[#00daf3] transition-all duration-200 ease-in-out" href="/admin/brokers">
              <span class="material-symbols-outlined" data-icon="public">public</span>
              <span class="font-['Inter'] text-sm tracking-tight">Manage Brokers</span>
          </a>
        `;
        document.getElementById("role-action-slot").innerHTML = "";
        document.getElementById("exec-label").textContent = "Global Execution";
      }

      function buildUserSidebar() {
        document.getElementById("role-nav-slot").innerHTML = `
          <button id="btn-broker-toggle" class="w-full flex items-center justify-between gap-3 px-4 py-3 text-[#c1c6d7] opacity-70 hover:bg-[#1b2025] hover:text-[#00daf3] transition-all duration-200 ease-in-out text-left">
              <div class="flex items-center gap-3">
                  <span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
                  <span class="font-['Inter'] text-sm tracking-tight">Brokers</span>
              </div>
              <span class="material-symbols-outlined text-sm transition-transform duration-200" id="broker-chevron" data-icon="expand_more">expand_more</span>
          </button>
          <div id="broker-dropdown" class="hidden px-2 pb-2 space-y-1 overflow-hidden transition-all duration-300">
              <div id="broker-list" class="space-y-1"></div>
              <a href="/connect" class="mt-2 flex items-center justify-center gap-1 px-3 py-2 text-[10px] font-bold uppercase tracking-widest text-primary opacity-70 hover:opacity-100 transition-all">
                  <span class="material-symbols-outlined text-xs">settings</span> Configure
              </a>
          </div>
        `;
        document.getElementById("role-action-slot").innerHTML = `
          <button onclick="window.location.href='/connect'" class="w-full py-3 px-4 rounded-xl bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-sm flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(0,218,243,0.15)] active:scale-95 duration-100">
              <span class="material-symbols-outlined text-lg" data-icon="person_add">person_add</span> Add Broker
          </button>
        `;
        document.getElementById("exec-label").textContent = "My Execution";

        // Wire broker toggle
        document.getElementById("btn-broker-toggle").addEventListener("click", () => {
          const dd = document.getElementById("broker-dropdown");
          const chev = document.getElementById("broker-chevron");
          dd.classList.toggle("hidden");
          chev.style.transform = dd.classList.contains("hidden")
            ? ""
            : "rotate(180deg)";
        });
      }

      function renderBrokerList(config) {
        const brokerList = document.getElementById("broker-list");
        if (!brokerList) return;
        brokerList.innerHTML = "";
        BROKERS.forEach((b) => {
          const isConfigured = b.configKey ? !!config[b.configKey] : false;
          const isActive = activeBroker === b.id;
          const div = document.createElement("div");
          div.className = `flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer transition-all duration-150 ${
            isActive
              ? "bg-[#1b2025] border border-primary/30 text-[#00daf3]"
              : "text-[#c1c6d7] hover:bg-[#1b2025] border border-transparent"
          }`;
          div.innerHTML = `
            <span class="material-symbols-outlined text-sm">${b.icon}</span>
            <div class="flex-1">
                <span class="text-xs font-semibold">${b.name}</span>
                <span class="block text-[9px] uppercase tracking-widest opacity-50">${isConfigured ? "Configured" : "Not configured"}</span>
            </div>
            ${isActive ? '<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: \'FILL\' 1;">check_circle</span>' : ""}
          `;
          div.addEventListener("click", async () => {
            if (!isConfigured && b.configKey) {
              if (
                confirm(
                  b.name + " is not configured yet. Go to broker settings?",
                )
              ) {
                window.location.href = "/connect";
              }
              return;
            }
            activeBroker = b.id;
            await fetch("/api/config", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ broker_preference: b.id }),
            });
            renderBrokerList(config);
          });
          brokerList.appendChild(div);
        });
      }

      async function loadBrokerState() {
        try {
          const bRes = await fetch("/api/brokers");
          if (bRes.ok) {
              BROKERS = await bRes.json();
          }

          const res = await fetch("/api/config");
          if (!res.ok) return;
          const config = await res.json();
          activeBroker = config.broker_preference || (BROKERS.length > 0 ? BROKERS[0].id : "none");
          renderBrokerList(config);
        } catch (e) {
          /* ignore */
        }
      }

      // ====== Boot ======
      async function boot() {
        // Determine role
        try {
          const meRes = await fetch("/api/me");
          if (meRes.ok) {
            const me = await meRes.json();
            currentRole = me.role;
          }
        } catch (e) {
          /* default to user */
        }

        // Build role-specific UI
        if (currentRole === "admin") {
          buildAdminSidebar();
        } else {
          buildUserSidebar();
          loadBrokerState();
        }

        loadExistingSignals();
        connectSSE();
        loadExecutionState();
      }

      boot();
    </script>
  </body>
</html>
