                        "on-error": "#690005",

                        "tertiary-fixed-dim": "#3ce36a",
                        "surface-container-low": "#171c21",
                        "on-secondary-container": "#acb5c9",
                        "outline-variant": "#414755",
                        "inverse-on-surface": "#2c3136",
                        "tertiary-container": "#00a744",
                        "surface-container-high": "#252a30",
                        "inverse-surface": "#dee3ea",
                        "on-secondary-fixed": "#131c2b",
                        "tertiary-fixed": "#69ff87",

                        "surface-container-highest": "#30353b",
                        "secondary": "#bec7db",
                        "surface-bright": "#353a3f",

                        "on-tertiary-fixed-variant": "#00531e",

                        "error": "#ffb4ab",
                        "on-primary-fixed": "#001f24",
                        "on-primary": "#00363d",
                        "on-secondary": "#283141",
                        "secondary-fixed": "#dae2f8",
                        "primary-container": "#009fb2",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .digital-obsidian-bg {
            background-color: #0f1419;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 218, 243, 0.03) 0%, transparent 50%),
                linear-gradient(rgba(15, 20, 25, 0.9), rgba(15, 20, 25, 0.9)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h1v1H0z' fill='%231b2025' fill-opacity='0.4'/%3E%3C/svg%3E");
        }
        .glass-card {
            box-shadow: 0 24px 48px -12px rgba(0, 218, 243, 0.08);
            backdrop-filter: blur(12px);
        }
        .ghost-border {
            border: 1px solid rgba(65, 71, 85, 0.15);
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Supressing Navigation Shell for Transactional Login Page -->
<main class="min-h-screen flex items-center justify-center p-6 digital-obsidian-bg relative overflow-hidden">
<!-- Background decorative glow -->
<div class="absolute -top-40 -left-40 w-96 h-96 bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-40 -right-40 w-96 h-96 bg-tertiary/5 blur-[120px] rounded-full"></div>
<section class="w-full max-w-[440px] z-10">

<!-- Login Card -->
<div class="surface-container glass-card ghost-border rounded-xl p-8 lg:p-10">
<form id="login-form" class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider block" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl group-focus-within:text-primary transition-colors">account_circle</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body text-sm" id="username" name="username" placeholder="USERNAME_OR_EMAIL" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-[10px] uppercase font-bold text-outline hover:text-primary transition-colors tracking-widest" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl group-focus-within:text-primary transition-colors">shield_lock</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body text-sm" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>

<!-- Primary Action -->
<div class="pt-2">
<button class="w-full group relative overflow-hidden bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-extrabold text-sm py-4 rounded-xl shadow-[0_0_20px_-5px_rgba(0,218,243,0.4)] hover:shadow-[0_0_30px_-5px_rgba(0,218,243,0.6)] active:scale-[0.98] transition-all" type="submit">
<span class="relative z-10 flex items-center justify-center gap-2">
                                LOGIN
                                <span class="material-symbols-outlined text-xl">login</span>
</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
</form>

</section>
</main>
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        
        btn.innerHTML = '<span class="relative z-10 flex items-center justify-center gap-2">AUTHENTICATING...</span>';
        btn.disabled = true;
        btn.classList.add('opacity-75', 'cursor-not-allowed');

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });

            if (response.ok) {
                window.location.href = '/dashboard';
            } else {
                alert('Invalid Credentials. Terminal Access Denied.');
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        } catch (err) {
            alert('Connection Intercepted or Failed. Try again later.');
            btn.innerHTML = originalText;
            btn.disabled = false;
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
        }
    });
</script>
</body></html>
